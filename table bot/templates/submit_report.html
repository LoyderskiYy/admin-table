{% extends "base.html" %}

{% block title %}Создать отчёт — Admin Panel{% endblock %}

{% block content %}
<div class="dashboard-wrapper">
    <div class="form-container">
        <div class="card form-card">
            <div class="card-header-form">
                <h2>📊 Создание отчёта</h2>
                <p>Опишите вашу проделанную работу за отчётный период</p>
            </div>
            
            <form method="POST" class="report-form">
                <div class="form-group">
                    <label for="content">Содержание отчёта</label>
                    <textarea 
                        name="content" 
                        id="content" 
                        rows="10" 
                        placeholder="Опишите вашу работу:
- Проведённые мероприятия
- Решённые проблемы
- Взаимодействие с игроками
- Другие достижения"
                        required
                    ></textarea>
                    <div class="char-count">
                        <span id="char-count">0</span> символов
                    </div>
                </div>
                
                <div class="form-actions">
                    <a href="{{ url_for('my_reports') }}" class="btn-cancel">Отмена</a>
                    <button type="submit" class="btn-submit">Отправить отчёт</button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .form-container {
        max-width: 800px;
        margin: 0 auto;
    }
    .form-card {
        padding: 0;
        overflow: hidden;
    }
    .card-header-form {
        padding: 24px 28px;
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.05));
        border-bottom: 1px solid var(--glass-border);
    }
    .card-header-form h2 {
        margin: 0 0 8px 0;
        font-size: 1.4rem;
        font-weight: 700;
        color: #fff;
    }
    .card-header-form p {
        margin: 0;
        color: var(--text-muted);
        font-size: 0.9rem;
    }
    .report-form {
        padding: 28px;
    }
    .form-group {
        margin-bottom: 24px;
    }
    .form-group label {
        display: block;
        margin-bottom: 10px;
        font-weight: 600;
        color: #e2e8f0;
        font-size: 0.9rem;
    }
    .form-group textarea {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        color: #fff;
        font-size: 0.95rem;
        font-family: inherit;
        resize: vertical;
        min-height: 200px;
        transition: all 0.2s ease;
    }
    .form-group textarea:focus {
        outline: none;
        border-color: rgba(99, 102, 241, 0.5);
        box-shadow: 0 0 25px rgba(99, 102, 241, 0.15);
    }
    .form-group textarea::placeholder {
        color: var(--text-muted);
    }
    .char-count {
        text-align: right;
        margin-top: 8px;
        font-size: 0.8rem;
        color: var(--text-muted);
    }
    .form-actions {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
    }
    .btn-cancel {
        padding: 12px 24px;
        border-radius: 12px;
        text-decoration: none;
        color: var(--text-muted);
        font-weight: 600;
        border: 1px solid var(--glass-border);
        transition: all 0.2s ease;
    }
    .btn-cancel:hover {
        background: rgba(255,255,255,0.05);
        color: #fff;
    }
    .btn-submit {
        padding: 12px 28px;
        border-radius: 12px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        font-weight: 600;
        border: none;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
    }
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 35px rgba(99, 102, 241, 0.4);
    }
</style>

<script>
document.getElementById('content').addEventListener('input', function(e) {
    document.getElementById('char-count').textContent = e.target.value.length;
});
</script>
{% endblock %}
