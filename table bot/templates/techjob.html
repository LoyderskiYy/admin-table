<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Технические работы | Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0f0f12;
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .maintenance-card {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
        }

        .icon-box {
            font-size: 80px;
            color: #7289da; /* Цвет Discord */
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        h1 {
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        p {
            color: #b9bbbe;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(114, 137, 218, 0.3);
            border-radius: 50%;
            border-top-color: #7289da;
            display: inline-block;
            animation: spin 1s ease-in-out infinite;
            margin-top: 20px;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(114, 137, 218, 0.2);
            color: #7289da;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="maintenance-card">
        <div class="status-badge">System Maintenance</div>
        <div class="icon-box">
            <i class="fas fa-tools"></i>
        </div>
        <h1>Техработы</h1>
        <p>
            Мы обновляем систему, чтобы сделать её быстрее и стабильнее. 
            Скоро всё вернется в строй!
        </p>
        <div class="loader"></div>
        <div class="mt-4">
            <small class="text-muted">Обычно это занимает не более 30 минут</small>
        </div>
    </div>

</body>
</html>
