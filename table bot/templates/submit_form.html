{% extends "base.html" %}

{% block title %}Отправить форму — Admin Panel{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<div class="form-wrapper">
    <div class="glass-card animate-fade-up">
        
        <div class="form-header">
            <div class="header-icon">
                <i class="fas fa-paper-plane"></i>
            </div>
            <div class="header-titles">
                <h1>Создание формы</h1>
                <p>Введите данные формы в поле ниже для отправки на проверку</p>
            </div>
        </div>

        <form method="POST" id="admin-form">
            <div class="input-section">
                <div class="input-meta">
                    <label for="content"><i class="fas fa-terminal"></i> Введёных текст</label>
                    <span id="char-count">0 символов</span>
                </div>
                
                <div class="textarea-container">
                    <textarea 
                        id="content" 
                        name="content" 
                        class="custom-textarea" 
                        rows="12" 
                        required 
                        placeholder="Системы готовы... Ждем ввода..."
                    ></textarea>
                    <div class="textarea-focus-border"></div>
                </div>
            </div>

            <div class="form-footer">
                <div class="tips">
                    <i class="fas fa-lightbulb"></i>
                    <span>Используйте Ctrl+Enter для быстрой отправки</span>
                </div>
                <button type="submit" class="submit-glow-btn">
                    <span>Отправить в систему</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </form>
    </div>
</div>

<style>
    :root {
        --primary-accent: #6366f1;
        --secondary-accent: #a855f7;
        --glass-bg: rgba(17, 18, 25, 0.8);
        --input-bg: rgba(0, 0, 0, 0.4);
        --border-color: rgba(255, 255, 255, 0.1);
        --text-muted: #94a3b8;
    }

    .form-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
        min-height: 80vh;
    }

    .glass-card {
        width: 100%;
        max-width: 800px;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border-color);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
    }

    /* Header */
    .form-header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 35px;
    }

    .header-icon {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        color: white;
        box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
    }

    .header-titles h1 {
        font-size: 1.6rem;
        font-weight: 800;
        margin: 0;
        color: white;
    }

    .header-titles p {
        margin: 5px 0 0;
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    /* Input Section */
    .input-section {
        margin-bottom: 30px;
    }

    .input-meta {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-muted);
    }

    .input-meta label i {
        color: var(--primary-accent);
        margin-right: 5px;
    }

    .textarea-container {
        position: relative;
        border-radius: 16px;
        overflow: hidden;
        background: var(--input-bg);
        border: 1px solid var(--border-color);
        transition: 0.3s;
    }

    .custom-textarea {
        width: 100%;
        background: transparent;
        border: none;
        padding: 20px;
        color: #e2e8f0;
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        font-size: 1rem;
        line-height: 1.6;
        resize: vertical;
        outline: none;
        box-sizing: border-box;
    }

    /* Эффект свечения границы */
    .textarea-focus-border {
        position: absolute;
        bottom: 0;
        left: 50%;
        width: 0;
        height: 2px;
        background: linear-gradient(to right, var(--primary-accent), var(--secondary-accent));
        transition: 0.4s ease;
        transform: translateX(-50%);
    }

    .custom-textarea:focus + .textarea-focus-border {
        width: 100%;
    }

    .textarea-container:focus-within {
        border-color: rgba(99, 102, 241, 0.4);
        box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
    }

    /* Footer */
    .form-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
    }

    .tips {
        color: var(--text-muted);
        font-size: 0.8rem;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .submit-glow-btn {
        background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
        color: white;
        border: none;
        padding: 14px 32px;
        border-radius: 14px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: 0.3s;
        box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
    }

    .submit-glow-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
        filter: brightness(1.1);
    }

    .submit-glow-btn:active {
        transform: translateY(1px);
    }

    /* Animations */
    .animate-fade-up {
        animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
        .form-footer { flex-direction: column; align-items: stretch; }
        .submit-glow-btn { justify-content: center; }
        .tips { justify-content: center; }
    }
</style>

<script>
    const textarea = document.getElementById('content');
    const charCount = document.getElementById('char-count');

    // Счетчик символов
    textarea.addEventListener('input', () => {
        const length = textarea.value.length;
        charCount.textContent = `${length} symbols`;
        
        if(length > 0) {
            charCount.style.color = 'var(--primary-accent)';
        } else {
            charCount.style.color = 'var(--text-muted)';
        }
    });

    // Отправка через Ctrl+Enter
    textarea.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') {
            document.getElementById('admin-form').submit();
        }
    });
</script>
{% endblock %}
